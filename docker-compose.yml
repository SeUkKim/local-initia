version: "3"

services:
  initiad:
    build:
      context: .
      dockerfile: Dockerfile.initia
    image: ghcr.io/initia-labs/initiad:v0.4.1
    hostname: initia
    pull_policy: always
    platform: linux/arm64
    volumes:
      - initia:/app
    networks:
      - default
    ports:
      - "1317:1317"
      - "8080:8080"
      - "9090:9090"
      - "9091:9091"
      - "26657:26657"
volumes:
  initia:

networks:
  default:
